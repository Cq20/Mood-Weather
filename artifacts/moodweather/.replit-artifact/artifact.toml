kind = "web"
previewPath = "/"
title = "MoodWeather"
version = "1.0.0"
id = "artifacts/moodweather"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18642

[services.development]
run = "pnpm --filter @workspace/moodweather run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moodweather", "run", "build" ]
publicDir = "artifacts/moodweather/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18642"
BASE_PATH = "/"
